name: ninja
description: Cryptography dart library to encrypt, decrypt, sign and verify messages
version: 3.0.1
homepage: https://github.com/ninja-dart/ninja
author: Ravi Teja Gudapati <tejainece@gmail.com>

environment:
  sdk: '>=2.12.0 <3.0.0'

dependencies:
  crypto: ^3.0.0
  ninja_prime:
    git:
      url: git://github.com/shkarimpour/prime.git
  ninja_pem: 
    git:
      url: git://github.com/shkarimpour/pem.git
  ninja_asn1:
    git:
      url: git://github.com/shkarimpour/asn1.git
  ninja_hex:
    git:
      url: git://github.com/shkarimpour/hex.git
  collection: ^1.15.0

dev_dependencies:
  test: ^1.3.0
  pedantic:
  ninja_openssl: ^1.0.4
